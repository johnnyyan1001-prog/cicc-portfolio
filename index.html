<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中金香港证券 · 持仓看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
  .header{background:linear-gradient(135deg,#1e2761 0%,#0f1117 100%);padding:24px 32px;border-bottom:1px solid #2d3748}
  .header h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:.5px}
  .header .sub{font-size:13px;color:#718096;margin-top:4px}
  .date-bar{display:flex;align-items:center;gap:12px;padding:16px 32px;background:#161b27;border-bottom:1px solid #2d3748;flex-wrap:wrap}
  .date-bar label{font-size:13px;color:#a0aec0}
  .date-btn{padding:6px 16px;border-radius:20px;border:1px solid #2d3748;background:transparent;color:#a0aec0;cursor:pointer;font-size:13px;transition:.2s}
  .date-btn.active{background:#3d4d8c;border-color:#5d6fb8;color:#fff;font-weight:600}
  .date-btn:hover:not(.active){border-color:#5d6fb8;color:#e2e8f0}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:24px 32px}
  .kpi{background:#161b27;border:1px solid #2d3748;border-radius:12px;padding:20px;position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent)}
  .kpi .label{font-size:12px;color:#718096;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .kpi .value{font-size:24px;font-weight:700;color:#fff}
  .kpi .delta{font-size:12px;margin-top:6px;color:#718096}
  .kpi .delta.up{color:#48bb78}
  .kpi .delta.down{color:#fc8181}
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 32px 24px}
  .chart-card{background:#161b27;border:1px solid #2d3748;border-radius:12px;padding:20px}
  .chart-card.wide{grid-column:1/-1}
  .chart-title{font-size:14px;font-weight:600;color:#a0aec0;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .chart-title .dot{width:8px;height:8px;border-radius:50%;background:var(--color,#c9a961)}
  .holdings-section{padding:0 32px 32px}
  .search-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .search-bar input{flex:1;min-width:200px;padding:8px 14px;border-radius:8px;border:1px solid #2d3748;background:#0f1117;color:#e2e8f0;font-size:14px;outline:none}
  .search-bar input:focus{border-color:#5d6fb8}
  .search-bar select{padding:8px 12px;border-radius:8px;border:1px solid #2d3748;background:#0f1117;color:#a0aec0;font-size:13px;outline:none;cursor:pointer}
  .sort-hint{font-size:12px;color:#4a5568;margin-left:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{padding:10px 12px;text-align:left;color:#718096;font-weight:600;border-bottom:1px solid #2d3748;cursor:pointer;user-select:none;white-space:nowrap}
  thead th:hover{color:#e2e8f0}
  thead th.sorted{color:#c9a961}
  tbody tr{border-bottom:1px solid #1a2035;transition:.15s}
  tbody tr:hover{background:#1e2537}
  tbody td{padding:9px 12px;vertical-align:middle}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .badge-us{background:#1a3a5c;color:#63b3ed}
  .badge-hk{background:#3a2a1a;color:#f6ad55}
  .bar-cell{display:flex;align-items:center;gap:8px}
  .bar-bg{flex:1;height:6px;background:#2d3748;border-radius:3px;min-width:60px}
  .bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3d4d8c,#5d6fb8)}
  .pct-text{font-size:12px;color:#718096;white-space:nowrap}
  .trend-section{padding:0 32px 24px}
  .trades-card{background:#161b27;border:1px solid #2d3748;border-radius:12px;padding:20px;margin:0 32px 24px}
  .trades-table td,.trades-table th{padding:8px 12px}
  .side-buy{color:#48bb78;font-weight:600}
  .side-sell{color:#fc8181;font-weight:600}
  .empty{text-align:center;padding:32px;color:#4a5568;font-size:14px}
  @media(max-width:768px){
    .kpi-grid{grid-template-columns:1fr 1fr}
    .charts-row{grid-template-columns:1fr}
    .chart-card.wide{grid-column:auto}
    .kpi-grid,.charts-row,.holdings-section,.trend-section,.trades-card{padding-left:16px;padding-right:16px}
    .date-bar{padding:12px 16px}
    .header{padding:16px}
  }
</style>
</head>
<body>
<div id="lockScreen" style="position:fixed;inset:0;background:#0f1117;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:24px">
  <div style="text-align:center">
    <div style="font-size:36px;margin-bottom:12px">🔒</div>
    <div style="font-size:20px;font-weight:700;color:#fff;margin-bottom:4px">中金持仓看板</div>
    <div style="font-size:13px;color:#718096;margin-bottom:32px">请输入访问密码</div>
    <input id="pwInput" type="password" placeholder="输入密码" onkeydown="if(event.key==='Enter')checkPw()"
      style="width:240px;padding:12px 16px;border-radius:8px;border:1px solid #2d3748;background:#161b27;color:#e2e8f0;font-size:16px;outline:none;text-align:center;display:block;margin:0 auto 16px">
    <button onclick="checkPw()"
      style="padding:12px 32px;border-radius:8px;background:#3d4d8c;border:none;color:#fff;font-size:15px;font-weight:600;cursor:pointer;width:240px">
      进入
    </button>
    <div id="pwErr" style="color:#fc8181;font-size:13px;margin-top:12px;display:none">密码错误，请重试</div>
  </div>
</div>
<script>
(function(){
  const KEY = 'cicc_auth';
  const HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8'; // 默认密码: password
  function sha256(str){
    // 简单哈希验证
    return Array.from(new TextEncoder().encode(str)).reduce((h,b)=>((h<<5)-h+b)|0,0).toString(16);
  }
  if(sessionStorage.getItem(KEY)==='1'){
    document.getElementById('lockScreen').style.display='none';
  }
  window.checkPw = function(){
    const v = document.getElementById('pwInput').value;
    // 密码存储在这里（明文，可修改）
    if(v === 'CICC2026'){
      sessionStorage.setItem(KEY,'1');
      document.getElementById('lockScreen').style.display='none';
    } else {
      document.getElementById('pwErr').style.display='block';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  }
})();
</script>


<div class="header">
  <h1>🏦 中金香港证券 · 持仓看板</h1>
  <div class="sub" id="lastUpdate">最后更新：—</div>
</div>

<div class="date-bar">
  <label>选择日期：</label>
  <div id="dateBtns" style="display:flex;gap:8px;flex-wrap:wrap"></div>
</div>

<!-- KPI -->
<div class="kpi-grid">
  <div class="kpi" style="--accent:#c9a961">
    <div class="label">净资产市值</div>
    <div class="value" id="kpi-nav">—</div>
    <div class="delta" id="kpi-nav-d">—</div>
  </div>
  <div class="kpi" style="--accent:#3d4d8c">
    <div class="label">投资组合总值</div>
    <div class="value" id="kpi-port">—</div>
    <div class="delta" id="kpi-port-d">—</div>
  </div>
  <div class="kpi" style="--accent:#2e8b57">
    <div class="label">现金结余</div>
    <div class="value" id="kpi-cash">—</div>
    <div class="delta" id="kpi-cash-d">—</div>
  </div>
  <div class="kpi" style="--accent:#718096">
    <div class="label">持仓只数</div>
    <div class="value" id="kpi-hold">—</div>
    <div class="delta" id="kpi-hold-d">—</div>
  </div>
</div>

<!-- 趋势图 -->
<div class="trend-section">
  <div class="chart-card">
    <div class="chart-title"><span class="dot" style="--color:#c9a961"></span>净资产历史走势</div>
    <canvas id="trendChart" height="80"></canvas>
  </div>
</div>

<!-- 图表行 -->
<div class="charts-row">
  <div class="chart-card">
    <div class="chart-title"><span class="dot"></span>行业大类分布</div>
    <canvas id="sectorChart" height="220"></canvas>
  </div>
  <div class="chart-card">
    <div class="chart-title"><span class="dot" style="--color:#3d4d8c"></span>Top 10 持仓 (USD)</div>
    <canvas id="top10Chart" height="220"></canvas>
  </div>
</div>

<!-- 当日交易 -->
<div class="trades-card" id="tradesSection">
  <div class="chart-title"><span class="dot" style="--color:#48bb78"></span>当日交易 <span id="tradeCount" style="font-size:12px;color:#718096"></span></div>
  <div id="tradesBody"></div>
</div>

<!-- 持仓明细 -->
<div class="holdings-section">
  <div class="chart-title" style="margin-bottom:12px"><span class="dot" style="--color:#5d6fb8"></span>持仓明细</div>
  <div class="search-bar">
    <input id="searchInput" placeholder="搜索代码 / 名称..." oninput="renderTable()">
    <select id="sectorFilter" onchange="renderTable()">
      <option value="">全部行业</option>
    </select>
    <select id="marketFilter" onchange="renderTable()">
      <option value="">美股+港股</option>
      <option value="美股">美股</option>
      <option value="港股">港股</option>
    </select>
    <span class="sort-hint" id="sortHint">点击表头排序</span>
  </div>
  <table id="holdTable">
    <thead>
      <tr>
        <th onclick="sortBy('code')">代码</th>
        <th onclick="sortBy('name')">名称</th>
        <th onclick="sortBy('market')">市场</th>
        <th onclick="sortBy('sector')">行业</th>
        <th onclick="sortBy('sub')">子板块</th>
        <th onclick="sortBy('qty')" style="text-align:right">数量</th>
        <th onclick="sortBy('price')" style="text-align:right">收市价</th>
        <th onclick="sortBy('mv_usd')" style="text-align:right">市值 (USD)</th>
        <th onclick="sortBy('pct')">占比</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div id="tableEmpty" class="empty" style="display:none">无匹配持仓</div>
</div>

  '#1e2761','#3d4d8c','#5d6fb8','#c9a961','#9a8654',
  '#cadcfc','#2e8b57','#718096','#d14b4b','#f6ad55'
];

let curIdx = ALL_DATA.length - 1;
let sortKey = 'mv_usd';
let sortAsc = false;
let trendChart, sectorChart, top10Chart;

function fmt(n){ return '$' + Math.round(n).toLocaleString('en-US'); }
function fmtM(n){
  if(Math.abs(n)>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if(Math.abs(n)>=1e3) return '$'+(n/1e3).toFixed(1)+'K';
  return '$'+Math.round(n).toLocaleString();
}
function delta(cur, prev, isCount=false){
  if(prev===undefined) return '<span style="color:#4a5568">首期数据</span>';
  const d = cur - prev;
  const cls = d>0?'up':d<0?'down':'';
  const sign = d>0?'+':'';
  const txt = isCount ? sign+d+'只' : sign+fmtM(d);
  return `<span class="delta ${cls}">${txt}</span>`;
}

// 日期按钮
function buildDateBtns(){
  const c = document.getElementById('dateBtns');
  c.innerHTML = '';
  ALL_DATA.forEach((d,i)=>{
    const b = document.createElement('button');
    b.className = 'date-btn' + (i===curIdx?' active':'');
    b.textContent = d.date;
    b.onclick = ()=>{ curIdx=i; refresh(); };
    c.appendChild(b);
  });
}

function refresh(){
  buildDateBtns();
  const cur = ALL_DATA[curIdx];
  const prev = curIdx>0 ? ALL_DATA[curIdx-1] : undefined;
  document.getElementById('lastUpdate').textContent = '结单日期：'+cur.date;

  // KPI
  document.getElementById('kpi-nav').textContent = fmtM(cur.net_asset);
  document.getElementById('kpi-nav-d').innerHTML = prev ? delta(cur.net_asset, prev.net_asset) : '<span style="color:#4a5568">首期</span>';
  document.getElementById('kpi-port').textContent = fmtM(cur.port_val);
  document.getElementById('kpi-port-d').innerHTML = prev ? delta(cur.port_val, prev.port_val) : '<span style="color:#4a5568">首期</span>';
  document.getElementById('kpi-cash').textContent = fmtM(cur.cash_val);
  document.getElementById('kpi-cash-d').innerHTML = prev ? delta(cur.cash_val, prev.cash_val) : '<span style="color:#4a5568">首期</span>';
  document.getElementById('kpi-hold').textContent = cur.n_hold + ' 只';
  document.getElementById('kpi-hold-d').innerHTML = prev ? delta(cur.n_hold, prev.n_hold, true) : '<span style="color:#4a5568">首期</span>';

  drawTrend();
  drawSector(cur);
  drawTop10(cur);
  renderTrades(cur);
  buildSectorFilter(cur);
  renderTable();
}

function drawTrend(){
  const labels = ALL_DATA.map(d=>d.date);
  const navs   = ALL_DATA.map(d=>d.net_asset);
  const ports  = ALL_DATA.map(d=>d.port_val);
  if(trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'),{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'净资产',data:navs,borderColor:'#c9a961',backgroundColor:'rgba(201,169,97,.12)',
         tension:.4,pointRadius:5,pointHoverRadius:7,fill:true,borderWidth:2.5},
        {label:'持仓市值',data:ports,borderColor:'#5d6fb8',backgroundColor:'rgba(93,111,184,.08)',
         tension:.4,pointRadius:5,pointHoverRadius:7,fill:true,borderWidth:2,borderDash:[4,3]},
      ]
    },
    options:{responsive:true,plugins:{legend:{labels:{color:'#a0aec0',font:{size:12}}},
      tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmtM(ctx.raw)}}},
      scales:{x:{ticks:{color:'#718096'},grid:{color:'#1a2035'}},
              y:{ticks:{color:'#718096',callback:v=>fmtM(v)},grid:{color:'#1a2035'}}}}
  });
}

function drawSector(cur){
  const agg={};
  cur.holdings.forEach(h=>{ agg[h.sector]=(agg[h.sector]||0)+h.mv_usd; });
  const sorted = Object.entries(agg).sort((a,b)=>b[1]-a[1]);
  if(sectorChart) sectorChart.destroy();
  sectorChart = new Chart(document.getElementById('sectorChart'),{
    type:'doughnut',
    data:{
      labels: sorted.map(s=>s[0]),
      datasets:[{data:sorted.map(s=>Math.round(s[1])),
        backgroundColor:SECTOR_COLORS,borderColor:'#161b27',borderWidth:2,hoverOffset:6}]
    },
    options:{responsive:true,cutout:'58%',
      plugins:{legend:{position:'right',labels:{color:'#a0aec0',font:{size:11},boxWidth:12,padding:8}},
        tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmtM(ctx.raw)+' ('+
          (ctx.raw/cur.port_val*100).toFixed(1)+'%)'}}}}
  });
}

function drawTop10(cur){
  const sorted = [...cur.holdings].sort((a,b)=>b.mv_usd-a.mv_usd).slice(0,10).reverse();
  if(top10Chart) top10Chart.destroy();
  top10Chart = new Chart(document.getElementById('top10Chart'),{
    type:'bar',
    data:{
      labels: sorted.map(h=>h.code),
      datasets:[{data:sorted.map(h=>Math.round(h.mv_usd)),
        backgroundColor:'#3d4d8c',hoverBackgroundColor:'#5d6fb8',borderRadius:4}]
    },
    options:{indexAxis:'y',responsive:true,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>fmtM(ctx.raw)+' ('+sorted[ctx.dataIndex].pct.toFixed(1)+'%)'}}},
      scales:{x:{ticks:{color:'#718096',callback:v=>fmtM(v)},grid:{color:'#1a2035'}},
              y:{ticks:{color:'#e2e8f0',font:{weight:'bold'}},grid:{display:false}}}}
  });
}

function renderTrades(cur){
  const trades = cur.trades || [];
  document.getElementById('tradeCount').textContent = trades.length ? `（${trades.length} 笔）` : '';
  const body = document.getElementById('tradesBody');
  if(!trades.length){
    body.innerHTML='<div class="empty">当日无交易</div>'; return;
  }
  body.innerHTML = `<table class="trades-table" style="width:100%;border-collapse:collapse;font-size:13px">
    <thead><tr style="border-bottom:1px solid #2d3748">
      <th style="padding:8px 12px;text-align:left;color:#718096">代码</th>
      <th style="padding:8px 12px;text-align:left;color:#718096">名称</th>
      <th style="padding:8px 12px;color:#718096">方向</th>
      <th style="padding:8px 12px;text-align:right;color:#718096">数量</th>
      <th style="padding:8px 12px;text-align:right;color:#718096">价格</th>
      <th style="padding:8px 12px;text-align:right;color:#718096">金额(USD)</th>
    </tr></thead>
    <tbody>${trades.map(t=>`<tr style="border-bottom:1px solid #1a2035">
      <td style="padding:8px 12px;font-weight:600">${t.code}</td>
      <td style="padding:8px 12px;color:#a0aec0">${t.name}</td>
      <td style="padding:8px 12px;text-align:center" class="${t.side==='买入'?'side-buy':'side-sell'}">${t.side}</td>
      <td style="padding:8px 12px;text-align:right">${(t.qty||0).toLocaleString()}</td>
      <td style="padding:8px 12px;text-align:right">${(t.price||0).toLocaleString()}</td>
      <td style="padding:8px 12px;text-align:right;color:${t.amount>0?'#48bb78':'#fc8181'}">${fmt(Math.abs(t.amount||0))}</td>
    </tr>`).join('')}</tbody></table>`;
}

function buildSectorFilter(cur){
  const sectors = [...new Set(cur.holdings.map(h=>h.sector))].sort();
  const sel = document.getElementById('sectorFilter');
  const prev = sel.value;
  sel.innerHTML = '<option value="">全部行业</option>';
  sectors.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
  if(sectors.includes(prev)) sel.value=prev;
}

function sortBy(key){
  if(sortKey===key) sortAsc=!sortAsc; else { sortKey=key; sortAsc=false; }
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted'));
  event.target.classList.add('sorted');
  renderTable();
}

function renderTable(){
  const cur = ALL_DATA[curIdx];
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sec = document.getElementById('sectorFilter').value;
  const mkt = document.getElementById('marketFilter').value;
  let rows = cur.holdings.filter(h=>{
    if(q && !h.code.toLowerCase().includes(q) && !h.name.toLowerCase().includes(q)) return false;
    if(sec && h.sector!==sec) return false;
    if(mkt && h.market!==mkt) return false;
    return true;
  });
  rows.sort((a,b)=>{
    const av=a[sortKey], bv=b[sortKey];
    if(typeof av==='number') return sortAsc?av-bv:bv-av;
    return sortAsc?String(av).localeCompare(String(bv),'zh'):String(bv).localeCompare(String(av),'zh');
  });
  const maxMv = Math.max(...cur.holdings.map(h=>h.mv_usd));
  const tbody = document.getElementById('tableBody');
  if(!rows.length){
    tbody.innerHTML=''; document.getElementById('tableEmpty').style.display='block'; return;
  }
  document.getElementById('tableEmpty').style.display='none';
  tbody.innerHTML = rows.map(h=>`<tr>
    <td style="font-weight:700;color:#e2e8f0">${h.code}</td>
    <td style="color:#a0aec0;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${h.name}">${h.name}</td>
    <td><span class="badge ${h.market==='美股'?'badge-us':'badge-hk'}">${h.market}</span></td>
    <td style="color:#a0aec0;font-size:12px">${h.sector}</td>
    <td style="color:#718096;font-size:11px">${h.sub}</td>
    <td style="text-align:right;color:#e2e8f0">${(h.qty||0).toLocaleString()}</td>
    <td style="text-align:right;color:#a0aec0">${h.price}</td>
    <td style="text-align:right;font-weight:600;color:#e2e8f0">${fmt(h.mv_usd)}</td>
    <td><div class="bar-cell">
      <div class="bar-bg"><div class="bar-fill" style="width:${(h.mv_usd/maxMv*100).toFixed(1)}%"></div></div>
      <span class="pct-text">${h.pct.toFixed(1)}%</span>
    </div></td>
  </tr>`).join('');
}

// 初始化
buildDateBtns();
refresh();
</script>
</body>
</html>
